system:
  log_level: INFO
  debug_mode: false

# 日志系统配置
logging:
  log_dir: "logs"
  console_level: "INFO"
  file_level: "DEBUG"
  max_file_size: 10485760  # 10MB
  backup_count: 5
  enable_console: true
  enable_file: true

# 免疫系统配置
immune_system:
  max_history_size: 100
  retry_policies:
    sensor:
      max_retries: 3
      retry_delay: 2.0
    actuator:
      max_retries: 2
      retry_delay: 1.0
    connector:
      max_retries: 5
      retry_delay: 3.0

# 稳态系统配置
homeostasis:
  check_interval: 5.0
  health_checks:
    cpu_usage:
      interval: 30.0
      warning_threshold: 70
      critical_threshold: 90
    memory_usage:
      interval: 30.0
      warning_threshold: 80
      critical_threshold: 90
    disk_usage:
      interval: 300.0
      warning_threshold: 85
      critical_threshold: 95

# 传感器配置
danmaku_sensor:
  platform: "test"
  filters: []
  user_whitelist: []
  user_blacklist: []
  keyword_blacklist: ["敏感词"]

command_sensor:
  command_prefix: "!"
  authorized_users: ["admin", "管理员"]

# 执行器配置
subtitle_actuator:
  max_subtitles: 5
  default_style:
    font: "微软雅黑"
    size: 20
    color: "#FFFFFF"
    bg_color: "#000000AA"
    position: "bottom"

live2d_actuator:
  idle_mode: true
  expressions:
    - "happy"
    - "sad"
    - "angry"
    - "surprised"
    - "default"
  motions:
    - "idle"
    - "wave"
    - "nod"
    - "shake"
  parameters:
    EyeOpen:
      min: 0.0
      max: 1.0
    MouthOpen:
      min: 0.0
      max: 1.0

# 配置MaiBot Core
maibot_core_connector:
  ws_url: "ws://localhost:8000/ws" # 连接MaiBot Core的Websocket地址
  heartbeat_interval: 30 # 心跳间隔，单位为秒
  max_reconnect_attempts: 10 # 最大重连次数
  reconnect_interval: 5.0 # 重连间隔，单位为秒